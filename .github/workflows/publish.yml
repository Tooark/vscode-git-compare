name: Publish VS Code Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  TRIVY_SCANNER_IMAGE: ghcr.io/tooark/trivy-hadolint:latest

jobs:
  release-meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
      notes_file: ${{ steps.meta.outputs.notes_file }}
      has_notes: ${{ steps.meta.outputs.has_notes }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolver versão e tag
        id: meta
        run: |
          set -eu

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          NOTES_WITH_V="notes/${TAG}.md"
          NOTES_NO_V="notes/${VERSION}.md"
          NOTES_FILE=""
          HAS_NOTES=false

          if [ -f "$NOTES_WITH_V" ]; then
            NOTES_FILE="$NOTES_WITH_V"
            HAS_NOTES=true
          elif [ -f "$NOTES_NO_V" ]; then
            NOTES_FILE="$NOTES_NO_V"
            HAS_NOTES=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "has_notes=$HAS_NOTES" >> "$GITHUB_OUTPUT"

      - name: Resumo da pré-checagem
        run: |
          echo "Versão detectada: ${{ steps.meta.outputs.version }}"
          echo "Tag alvo: ${{ steps.meta.outputs.tag }}"
          echo "Tag já existe: ${{ steps.meta.outputs.tag_exists }}"
          echo "Arquivo de notes: ${{ steps.meta.outputs.notes_file }}"
          echo "Notes encontrado: ${{ steps.meta.outputs.has_notes }}"

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: release-meta
    if: needs.release-meta.outputs.tag_exists != 'true'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run filesystem scan
        env:
          TRIVY_EXIT_CODE: "1"
          TRIVY_IGNORE_UNFIXED: "true"
          TRIVY_TIMEOUT: 10m
        run: |
          mkdir -p "${{ runner.temp }}/ci-reports"
          chmod 0777 "${{ runner.temp }}/ci-reports"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ runner.temp }}/ci-reports:/tmp/ci-reports" \
            -e TRIVY_OUTPUT=/tmp/ci-reports/trivy-file.json \
            "$TRIVY_SCANNER_IMAGE" \
            filesystem-scan /workspace

      - name: Run repository scan
        env:
          TRIVY_SEVERITY: CRITICAL,HIGH
          TRIVY_EXIT_CODE: "1"
          TRIVY_IGNORE_UNFIXED: "true"
          TRIVY_TIMEOUT: 10m
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ runner.temp }}/ci-reports:/tmp/ci-reports" \
            -e TRIVY_OUTPUT=/tmp/ci-reports/trivy-repo.json \
            "$TRIVY_SCANNER_IMAGE" \
            repo-scan /workspace

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}
          path: ${{ runner.temp }}/ci-reports
          retention-days: 30

  build-and-publish:
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - security-scan
    if: needs.release-meta.outputs.tag_exists != 'true'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compilar extensão
        run: npm run compile

      - name: Rodar testes
        run: xvfb-run -a npm test
        continue-on-error: true # Continua mesmo se testes falharem

      - name: Instalar vsce
        run: npm install -g @vscode/vsce

      - name: Empacotar extensão (.vsix)
        run: vsce package

      - name: Upload do artefato .vsix
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: "*.vsix"

      - name: Publicar no VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p $VSCE_PAT

      - name: Publicar no Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npm install -g ovsx
          ovsx publish -p $OVSX_PAT

      - name: Criar e enviar tag da versão
        env:
          TAG_NAME: ${{ needs.release-meta.outputs.tag }}
        run: |
          set -eu

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} já existe no remoto, ignorando criação."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"

      - name: Criar GitHub Release com notes da versão
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-meta.outputs.tag }}
          NOTES_FILE: ${{ needs.release-meta.outputs.notes_file }}
          HAS_NOTES: ${{ needs.release-meta.outputs.has_notes }}
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          set -eu

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME já existe, ignorando criação."
            exit 0
          fi

          if [ "$HAS_NOTES" = "true" ] && [ -n "$NOTES_FILE" ] && [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              *.vsix
          else
            TMP_NOTES=$(mktemp)
            {
              echo "# Release $TAG_NAME"
              echo
              echo "Versão publicada automaticamente a partir do package.json: $VERSION."
              echo
              echo "Arquivo de release notes não encontrado em notes/v$VERSION.md ou notes/$VERSION.md."
            } > "$TMP_NOTES"

            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file "$TMP_NOTES" \
              *.vsix

            rm -f "$TMP_NOTES"
          fi

  skip-existing-version:
    name: Skip publish (tag already exists)
    runs-on: ubuntu-latest
    needs: release-meta
    if: needs.release-meta.outputs.tag_exists == 'true'
    steps:
      - name: Encerrar sem publicar
        run: |
          echo "Tag ${{ needs.release-meta.outputs.tag }} já existe. Publicação encerrada sem deploy."
